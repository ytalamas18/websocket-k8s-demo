<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>WS Practice Dashboard</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: #fff; text-align: center; padding: 50px; }
        .card { background: #1e1e1e; padding: 30px; border-radius: 10px; display: inline-block; min-width: 250px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        #price { font-size: 2.5rem; color: #00ff88; margin: 15px 0; }
        button { background: #007acc; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
        button:hover { background: #005999; }
    </style>
</head>
<body>

    <div class="card">
        <h2>Live Ticker Feed</h2>
        <div id="ticker">Connecting...</div>
        <div id="price">$0.00</div>
        <small id="time"></small>
        <br><br>
        <button id="pingBtn">Ping Server</button>
    </div>

    <script>
        const socket = new WebSocket('ws://localhost:30080');

        const tickerEl = document.getElementById('ticker');
        const priceEl = document.getElementById('price');
        const timeEl = document.getElementById('time');
        const pingBtn = document.getElementById('pingBtn');

        // Handle incoming live stream
        socket.onmessage = (event) => {
            const data = JSON.parse(event.data);
            tickerEl.innerText = data.ticker;
            priceEl.innerText = `$${data.price}`;
            timeEl.innerText = `Last updated: ${data.timestamp}`;
        };

        socket.onopen = () => { tickerEl.innerText = 'Connected! Waiting for data...'; };
        socket.onclose = () => { tickerEl.innerText = 'Disconnected from server.'; };

        // Send interaction back to server
        pingBtn.addEventListener('click', () => {
            socket.send('Button clicked in UI!');
        });
    </script>
</body>
</html>
